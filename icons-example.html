<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icone di FontAwesome</title>
    <!-- qui importo le icone di font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- qui importo il mio foglio di stile -->
    <link rel="stylesheet" href="./css/icons-style.css" />
  </head>
  <body>
    <header>
      <h1>Icone di font-awesome</h1>
    </header>
    <main>
      <section>
        <div>
          <p>Icona del laptop: <i class="fas fa-laptop"></i></p>
          <p>
            Icona di rete: <i id="middle-icon" class="fas fa-network-wired"></i>
          </p>
          <p>Icona del CD: <i class="fas fa-compact-disc"></i></p>
          <!-- potete anche utilizzare le emoji della tastiera, tenete solo in considerazione
           che ogni sistema operativo potrebbe visualizzarle in modo leggermente diverso -->
          <p>Icona che non funziona: <i class="fal fa-compact-disc"></i></p>
          <p>Utilizzo un emoji: 👨‍💻</p>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
